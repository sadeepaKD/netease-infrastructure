# clients.conf - RADIUS Client Definitions
# NetEASE Infrastructure

# Allow localhost for testing (radtest from within the container)
client localhost {
    ipaddr = 127.0.0.1
    secret = testing123
    require_message_authenticator = no
    nas_type = other
}

# Lab Cisco WS-C3560-8PC Switch (via VPN tunnel)
# This is the RADIUS client in the on-premise lab
client lab_switch {
    ipaddr = 10.0.10.0/24
    secret = radius_secret_123
    require_message_authenticator = no
    nas_type = cisco
    shortname = lab_switch
}

# Docker bridge gateway — appears as source when switch traffic is NAT'd
# through the host's port mapping (0.0.0.0:1812 -> container)
client docker_gateway {
    ipaddr = 172.23.0.1
    secret = radius_secret_123
    require_message_authenticator = yes
    limit_proxy_state = no
    nas_type = cisco
    shortname = docker_gateway
}

# Meraki MR36 Cloud Managed Indoor AP (Wireless 802.1X)
# This AP will authenticate wireless clients via RADIUS
# You MUST configure this same shared secret on the Meraki AP
# in Dashboard → Network-wide → Configure → Manage VLAN settings → RADIUS Server (or Advanced Settings)
client wireless_ap_meraki {
    ipaddr = 10.0.10.3
    secret = MerakiAP_Netease_Secret_2026
    require_message_authenticator = no
    nas_type = other
    shortname = wireless_ap_meraki
}
